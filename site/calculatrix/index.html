<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Legal pages for Calculatrix.">
  <title>Calculatrix Legal</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f0e8;
      --surface: #fffaf0;
      --ink: #1c1a17;
      --muted: #5b554c;
      --accent: #b2552d;
      --border: #d7c9b4;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      background:
        radial-gradient(circle at top, rgba(178, 85, 45, 0.12), transparent 35%),
        linear-gradient(180deg, var(--bg), #efe6d8);
      color: var(--ink);
    }

    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 20px 72px;
    }

    article {
      background: color-mix(in srgb, var(--surface) 92%, white 8%);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      box-shadow: 0 18px 40px rgba(28, 26, 23, 0.08);
    }

    h1,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.12;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(178, 85, 45, 0.12);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    a {
      color: var(--accent);
      font-weight: 700;
    }

    ul {
      padding-left: 20px;
      margin: 0;
    }

    li {
      margin-bottom: 10px;
      color: var(--muted);
      line-height: 1.6;
    }

    @media (max-width: 640px) {
      main {
        padding: 24px 14px 48px;
      }

      article {
        padding: 22px 18px;
        border-radius: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <article>
      <div class="eyebrow">Calculatrix</div>
      <h1>Legal pages</h1>
      <p>
        This section contains the public legal and policy pages for Calculatrix.
        Use the product-specific URLs from here in release materials and store
        submissions.
      </p>

      <ul>
        <li><a href="privacy/">Privacy Policy</a></li>
        <li><a href="../">Back to CCISNE Legal</a></li>
      </ul>
    </article>
  </main>
</body>
</html>
